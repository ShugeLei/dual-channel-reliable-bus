name: tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install CPU torch + project
        run: |
          python -m pip install --upgrade pip
          # CPU-only torch keeps CI fast and free.
          pip install torch torchvision --index-url https://download.pytorch.org/whl/cpu
          # opencv-contrib needed for cv2.ximgproc (SLIC).
          pip install opencv-contrib-python
          pip install -e .
          pip install pytest

      - name: Smoke-check imports
        run: |
          python -c "from src.attribution import sp_risa, rise; print('attribution ok')"
          python -c "from src.reliability import compute_irs, compute_prs, drs_tester; print('reliability ok')"
          python -c "from src.metrics import ece, CalibrationMetric; print('metrics ok')"
          python -c "from src.soup import uniform_soup, greedy_soup, reliable_soup; print('soup ok')"
          python -c "from src.models import build_model; print('models ok')"

      - name: Run tests
        run: pytest tests/ -v --tb=short
